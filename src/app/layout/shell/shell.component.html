<div class="loader" [class.hidden]="isLoaded" [class.done]="isLoaded">

  <div class="loader-content">
    <div class="name-horizon">
      <div class="loader-text">PRABHU TEJA PAMULA</div>
      <div class="progress-container">
        <div class="progress-bar" [style.width.%]="progress">
          <div class="progress-flare"></div>
        </div>
      </div>
    </div>
    <div class="loader-status">
      please wait, loading assets<span class="dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
    </div>
  </div>
</div>

<header class="shell-header" [class.visible]="isLoaded">
  <div class="header-left">
    <a routerLink="/" class="name" [class.active]="isHomeActive">
      PRABHU TEJA PAMULA
    </a>
  </div>

  <nav class="header-center">
    <a routerLink="/work" routerLinkActive="active">Work</a>
    <a routerLink="/about" routerLinkActive="active">About</a>
  </nav>

  <div class="header-right">
    <a routerLink="/social" class="social-link" routerLinkActive="active">Social</a>
  </div>
</header>

<app-globe (ready)="onGlobeReady()"></app-globe>

<div class="router-container" [@routeAnimations]="getRouteAnimationData()">
  <router-outlet></router-outlet>
</div>
